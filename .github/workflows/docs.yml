# Ledger — API Documentation
# Generates godoc-style HTML via pkgsite, mirrors it to a static directory,
# and publishes to GitHub Pages on every version tag.

name: Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.0'
  MODULE_PATH: github.com/bbmumford/ledger

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install pkgsite
        run: go install golang.org/x/pkgsite/cmd/pkgsite@latest

      - name: Start pkgsite server
        run: |
          pkgsite -http=127.0.0.1:8080 . &
          echo $! > pkgsite.pid
          for i in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:8080/${MODULE_PATH}" >/dev/null 2>&1; then
              echo "pkgsite ready"
              break
            fi
            sleep 1
          done

      - name: Mirror documentation to static HTML
        run: |
          mkdir -p docs-build
          wget \
            --recursive \
            --level=5 \
            --adjust-extension \
            --no-parent \
            --no-host-directories \
            --convert-links \
            --page-requisites \
            --reject-regex '.*(search|fetch|mod/.*\?).*' \
            --directory-prefix=docs-build \
            "http://127.0.0.1:8080/${MODULE_PATH}" || true
          cat > docs-build/index.html <<HTML
          <!doctype html><meta charset=utf-8>
          <meta http-equiv="refresh" content="0; url=${MODULE_PATH}/">
          <title>Ledger docs</title>
          HTML

      - name: Stop pkgsite
        if: always()
        run: |
          if [ -f pkgsite.pid ]; then
            kill "$(cat pkgsite.pid)" || true
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-build

      - id: deployment
        uses: actions/deploy-pages@v4
